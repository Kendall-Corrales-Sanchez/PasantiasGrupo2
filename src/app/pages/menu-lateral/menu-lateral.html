<div class="layout-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-content">
      <!-- Logo / Principal -->
      <div class="sidebar-item sidebar-brand" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" routerLink="/principal">
        <span class="sidebar-icon">
          <i class="pi pi-home"></i>
        </span>
        <span class="sidebar-label">Principal</span>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Ver mi perfil -->
      <div class="sidebar-item" routerLinkActive="active" routerLink="/perfil">
        <span class="sidebar-icon">
          <i class="pi pi-user"></i>
        </span>
        <span class="sidebar-label">Ver mi perfil</span>
      </div>

      <!-- Mensajería -->
      <div class="sidebar-item" routerLinkActive="active" routerLink="/mensajeria">
        <span class="sidebar-icon sidebar-icon-badge">
          <i class="pi pi-comments"></i>
          <p-badge value="1" severity="danger" styleClass="sidebar-badge"></p-badge>
        </span>
        <span class="sidebar-label">Mensajería</span>
      </div>

      <!-- Notificaciones -->
      <div class="sidebar-item" routerLinkActive="active" routerLink="/notificaciones">
        <span class="sidebar-icon">
          <i class="pi pi-bell"></i>
        </span>
        <span class="sidebar-label">Notificaciones</span>
      </div>
    </div>

    <!-- Cerrar Sesión al fondo -->
    <div class="sidebar-footer">
      <div class="sidebar-divider"></div>
      <div class="sidebar-item sidebar-logout" (click)="cerrarSesion()">
        <span class="sidebar-icon">
          <i class="pi pi-sign-out"></i>
        </span>
        <span class="sidebar-label">Cerrar Sesión</span>
      </div>
    </div>
  </aside>

  <!-- Contenido principal -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
