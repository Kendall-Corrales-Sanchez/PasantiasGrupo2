<p-drawer
  [(visible)]="visible"
  [closable]="true"
  position="right"
  [style]="{ width: '30rem' }"
  (onHide)="cerrar()"
>

  <ng-template #header>
    <div class="drawer-header">
      <span class="drawer-header-title">{{ pasantia?.companyName }}</span>
    </div>
  </ng-template>

  <div class="drawer-body" *ngIf="pasantia">
    <h2 class="drawer-title">{{ pasantia.nameInternship }}</h2>

    <div class="drawer-detail">
      <span class="detail-label">Empresa:</span>
      <span>{{ pasantia.companyName }}</span>
    </div>
    <div class="drawer-detail">
      <span class="detail-label">Carrera:</span>
      <span>{{ pasantia.carrerInteresting }}</span>
    </div>
    <div class="drawer-detail">
      <span class="detail-label">Modalidad:</span>
      <span>{{ pasantia.modeName }}</span>
    </div>
    <div class="drawer-detail">
      <span class="detail-label">Ubicación:</span>
      <span>{{ pasantia.provinceName }}</span>
    </div>
    <div class="drawer-detail">
      <span class="detail-label">Remuneración:</span>
      <span>{{ pasantia.remuneration }}</span>
    </div>
  </div>

  <ng-template #footer>
    <div class="drawer-footer">
      <button pButton label="Postularme" icon="pi pi-send" class="w-full" (click)="postular()"></button>
      <button pButton label="Cerrar" icon="pi pi-times" class="w-full" severity="danger" text (click)="cerrar()"></button>
    </div>
  </ng-template>

</p-drawer>
