<div class="card">
  <app-filter />

  <div style="height: 1px; background: linear-gradient(to right, transparent, #334155, transparent); margin: 0 1rem;">
  </div>

  <p-dataview #dv [value]="interships()" [rows]="5" [paginator]="true">
    <ng-template #list let-items>
      <div class="flex flex-col">
        <ng-container *ngFor="let item of items; let first = first; let last = last">
          <div class="flex flex-row items-center p-4 gap-4">

            <!-- Imagen -->
            <div class="relative flex-shrink-0">
              <img [src]="item.image" [alt]="item.nameJob"
                style="width: 100px; height: 100px; object-fit: cover; border-radius: 10px;" />
              <p-tag [value]="item.mode"
                style="position: absolute; top: 4px; left: 4px; font-size: 0.65rem;" />
            </div>

            <!-- Info central -->
            <div class="flex flex-col gap-1 flex-1">
              <span style="font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em;">
                {{ item.company }}
              </span>
              <span style="font-size: 1rem; font-weight: 700; color: #f1f5f9;">
                {{ item.nameJob }}
              </span>
              <span style="font-size: 0.8rem; color: #64748b;">
                {{ item.carrer }}
              </span>
              <div style="display: inline-flex; align-items: center; gap: 4px; color: #3b82f6; font-size: 0.8rem; margin-top: 4px;">
                <i class="pi pi-map-marker"></i>
                {{ item.ubication }}
              </div>
            </div>

            <!-- Precio y botones -->
            <div class="flex flex-col items-end gap-3 flex-shrink-0">
              <span style="font-size: 1.1rem; font-weight: 700; color: #ffffff;">
              </span>
              <div class="flex gap-2">
                <p-button icon="pi pi-eye" label="Ver Más" (onClick)="verMas(item)" />
              </div>
            </div>

          </div>

          <!-- Separador -->
          <div *ngIf="!last"
            style="height: 1px; background: linear-gradient(to right, transparent, #334155, transparent); margin: 0 1rem;">
          </div>

        </ng-container>
      </div>
    </ng-template>
  </p-dataview>
</div>
