
<div class="container">
  <div class="cards-wrapper">

    <p-card styleClass="role-card" (click)="redirrection('registerEmpresa')">
      <div class="card-content">
        <i class="pi pi-building card-icon"></i>
        <span class="card-label">Empresa</span>
      </div>
    </p-card>

    <p-card styleClass="role-card" (click)="redirrection('registerStudent')">
      <div class="card-content">
        
        <i class="pi pi-user-plus card-icon"></i>
        <span class="card-label">Estudiante</span>
      </div>
    </p-card>

  </div>

  <div class="back-btn-wrapper">
    <p-button
      label="Volver"
      icon="pi pi-arrow-left"
      styleClass="p-button-sm back-btn"
      (onClick)="redirrection('/login')">
    </p-button>
  </div>
</div>
